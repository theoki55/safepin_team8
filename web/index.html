<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="在宅避難の見えない孤立を、地図でつなぐピン立てマップ">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SafePin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SafePin | 在宅避難の見えない孤立を、地図でつなぐ</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Firebase JS SDK は firebase_core_web(2.24.0)が modular SDK を
    動的注入する(auth/firestore/storage を含む)。手動で compat script を
    追加すると window.firebase が先に定義され、core が「初期化済み」と誤認
    して自動注入をスキップし、auth が channel-error になる。
    そのため、ここに Firebase の <script> は一切書かないこと。
  -->

  <!--
    以前に登録された古い Service Worker が、バグを含む古いキャッシュを
    配信し続ける問題を防ぐため、既存の Service Worker を明示的に解除する。
  -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        for (var i = 0; i < regs.length; i++) {
          regs[i].unregister();
        }
      }).catch(function () {});
      if (window.caches && caches.keys) {
        caches.keys().then(function (keys) {
          keys.forEach(function (k) { caches.delete(k); });
        }).catch(function () {});
      }
    }
  </script>

  <!--
    iOS Safari 対策:
    CanvasKit(WASM)を既定の gstatic CDN ではなく、同一オリジンの
    /canvaskit/ から読み込む。iOS Safari では クロスサイトの WASM
    読み込みがプライバシー設定/ネットワークで失敗し、白画面になる
    ことがあるため、CDN 依存を排除する。

    flutter_bootstrap.js は引数なしで _flutter.loader.load() を呼ぶため
    config を渡せない。そこで _flutter.loader.load を事前にラップし、
    canvasKitBaseUrl を強制注入してから本来の load() を実行する。
    engineRevision は flutter_bootstrap.js が設定する buildConfig を
    そのまま使うので、ビルド更新にも自動追従する。
  -->
  <script>
    (function () {
      window._flutter = window._flutter || {};
      // loader が bootstrap によって定義される前にプロパティをフックする
      var loaderStore;
      Object.defineProperty(window._flutter, 'loader', {
        configurable: true,
        enumerable: true,
        get: function () { return loaderStore; },
        set: function (value) {
          // 本来の load をラップし、config.canvasKitBaseUrl を強制する
          if (value && typeof value.load === 'function') {
            var originalLoad = value.load.bind(value);
            value.load = function (options) {
              options = options || {};
              options.config = options.config || {};
              if (!options.config.canvasKitBaseUrl) {
                options.config.canvasKitBaseUrl = 'canvaskit/';
              }
              return originalLoad(options);
            };
          }
          loaderStore = value;
        }
      });
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
